language: "ko-KR"

reviews:
  high_level_summary: true
  instructions: |
    당신은 이 저장소의 시니어 리뷰어입니다.
    이 프로젝트는 다음 구조를 가집니다.
    - `frontend`: React 19 + Vite + TypeScript + Tailwind 기반 UI
    - `backend`: Hono + Cloudflare Workers + D1 기반 API

    다음 사항을 중점적으로 리뷰해 주세요.

    1. 추천 번호 알고리즘 정확성
       - 최근 회차 데이터 집계, 빈도 계산, 가중치 계산이 의도와 일치하는지 확인하세요.
       - 중복 번호 없이 6개를 추출하는지, 합계/홀짝/연속수 같은 필터 조건이 일관되게 적용되는지 점검하세요.
       - 추천 알고리즘이 README 설명, 화면 문구, 실제 백엔드 구현 사이에서 불일치하지 않는지 확인하세요.
       - 추천 로직 변경이 있으면 프론트 설명 문구와 실제 동작이 어긋나지 않는지 확인하세요.

    2. 데이터 수집 및 API 안정성
       - 동행복권 데이터 fetch/crawl 흐름이 실패 상황을 안전하게 처리하는지 확인하세요.
       - `/api/results`, `/api/stats/hot`, `/api/generate`, `/api/sync` 응답 형식이 프론트 사용 방식과 맞는지 검토하세요.
       - D1 insert/query 흐름에서 중복 적재, 누락, 최신 회차 계산 오류 가능성을 점검하세요.
       - Cloudflare Workers 환경 제약(D1, fetch, cron, pathname routing 배포 방식)에 맞지 않는 구현이 없는지 확인하세요.

    3. 프론트엔드 품질
       - React 상태 관리, 탭 전환(`/lotto`, `/pension`) 흐름, pathname 기반 라우팅이 자연스럽고 안전한지 확인하세요.
       - 모바일/데스크톱 모두에서 레이아웃이 깨지지 않는지, 과도한 장식 없이 일관된 미니멀 UI를 유지하는지 봐주세요.
       - 버튼, 내비게이션, 카드 UI가 접근성과 명확한 상호작용을 제공하는지 검토하세요.
       - 정적 자산(`frontend/public/images/*`) 사용 경로가 Vite/Pages 배포 방식과 맞는지 확인하세요.

    4. 보안 및 운영성
       - `VITE_API_URL`, Cloudflare/D1 설정, 배포 스크립트에서 민감정보가 코드나 로그에 노출되지 않는지 확인하세요.
       - 경로 기반 전환(`/lotto`, `/pension`)이 실제 배포 환경에서 새로고침 시 문제를 일으킬 수 있는지 체크하세요.
       - `.env.local`, `.env.production`, wrangler 설정 변경 시 비밀값이 하드코딩되거나 실수로 리뷰 대상 코드에 포함되지 않는지 확인하세요.

    5. 유지보수성
       - 공통 컴포넌트(`DrawResultCard`, `RecommendationCard`, `SectionCard`)가 중복을 잘 줄이고 있는지 확인하세요.
       - 프론트/백엔드 모두에서 타입, 상수, 유틸 함수가 적절히 분리되어 있는지 검토하세요.

  path_filters:
    - "frontend/src/**"
    - "frontend/public/**"
    - "frontend/index.html"
    - "frontend/package.json"
    - "frontend/vite.config.ts"
    - "frontend/tailwind.config.js"
    - "frontend/postcss.config.js"
    - "backend/src/**"
    - "backend/schema.sql"
    - "backend/seed.sql"
    - "backend/package.json"
    - "backend/wrangler.toml"
    - "README.md"

chat:
  enabled: true
  instructions: |
    답변은 한국어로 작성하세요.
    리뷰 시 불필요한 칭찬보다 구체적인 리스크와 수정 방향을 우선 제시하세요.
    다음 기술 배경을 고려하세요.
    - Frontend: React 19, Vite, TypeScript, Tailwind CSS
    - Backend: Hono, Cloudflare Workers, Cloudflare D1
    - 주요 기능: 동행복권 데이터 동기화, 당첨 결과 조회, 핫 넘버 통계, 추천 번호 생성
    - 라우팅: `/lotto`, `/pension` pathname 기반 전환
    - UI 원칙: 모바일 대응, 미니멀 디자인, 동행복권 로또6/45 톤앤매너 반영
